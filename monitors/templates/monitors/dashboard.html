<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pingboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    header { display: flex; justify-content: space-between; align-items: center; }
    details { margin-bottom: 1rem; }
    #chart-container { margin-top: 2rem; display: none; }
    .status-badge {
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-weight: 600;
      display: inline-block;
      white-space: nowrap;
    }
    .status-up {
      background-color: #d4edda;
      color: #155724;
    }
    .status-down {
      background-color: #f8d7da;
      color: #721c24;
    }
    .status-unknown {
      background-color: #e2e3e5;
      color: #383d41;
    }
    tbody tr { cursor: pointer; }
    .selected-row { background-color: #dbeafe; }
  </style>
</head>
<body>
  <main class="container">

    <!-- Header -->
    <header>
      <h1>Pingboard</h1>
      <button id="logout-btn" class="outline">Sign out</button>
    </header>

    <!-- Add Monitor (collapsible) -->
    <details>
      <summary>Add monitor</summary>
      <div class="grid">
        <label>
          Name
          <input type="text" id="monitor-name" placeholder="My API" />
        </label>
        <label>
          URL
          <input type="url" id="monitor-url" placeholder="https://example.com/health" />
        </label>
      </div>
      <button id="add-monitor-btn">Add monitor</button>
    </details>

    <!-- Monitor table -->
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>URL</th>
          <th>Status</th>
          <th>Response</th>
          <th>Last Checked</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="monitors-tbody">
        <tr id="empty-row">
          <td colspan="6" style="text-align:center;">No monitors yet. Add one above.</td>
        </tr>
      </tbody>
    </table>

    <!-- Chart placeholder (Week 5) -->
    <div id="chart-container">
      <canvas id="chart"></canvas>
    </div>

  </main>

  <script>
    const token = sessionStorage.getItem('token');
    if (!token) window.location.href = '/login/';

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.removeItem('token');
      window.location.href = '/login/';
    });



    const chartCtx = document.getElementById('chart').getContext('2d');
    const monitorChart = new Chart(chartCtx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'Response time (ms)',
          data: [],
          borderColor: 'blue',
          backgroundColor: 'rgba(0, 123, 255, 0.2)',
          fill: true,
          tension: 0.3,
        }]
      },
      options: {
        scales: {
          y: {
            beginAtZero: true,
            title: { display: true, text: 'Milliseconds' }
          }
        }
      }
    });

    function renderChart(monitors) {
      const labels = monitors.length ? monitors.map(m => m.name) : ['No monitors'];
      const data = monitors.length ? monitors.map(m => m.latest_check?.response_time_ms ?? 0) : [0];

      monitorChart.data.labels = labels;
      monitorChart.data.datasets[0].data = data;
      monitorChart.update();
    }

    async function loadMonitors() {
      const res = await fetch('/api/monitors/', {
        headers: { 'Authorization': `Token ${token}` }
      });
      if (res.status === 401) { window.location.href = '/login/'; return; }
      const monitors = await res.json();
      renderTable(monitors);
      renderChart(monitors);
    }

    function renderTable(monitors) {
      const tbody = document.getElementById('monitors-tbody');
      if (monitors.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No monitors yet. Add one above.</td></tr>`;
        return;
      }
      tbody.innerHTML = monitors.map(m => {
        const c = m.latest_check;
        
        // Status badge: colored UP or DOWN, or Pending if null
        let statusHTML;
        if (!c) {
          statusHTML = '<span class="status-badge status-unknown">Pending</span>';
        } else if (c.is_up === true) {
          statusHTML = '<span class="status-badge status-up">● UP</span>';
        } else if (c.is_up === false) {
          statusHTML = '<span class="status-badge status-down">● DOWN</span>';
        }
        
        // Response time: response_time_ms + "ms", or "—" if null
        const response = c && c.response_time_ms != null ? `${c.response_time_ms}ms` : '—';
        
        // Last checked: formatted as readable time using toLocaleString()
        const checked = c && c.checked_at ? new Date(c.checked_at).toLocaleString() : '—';
        
        return `<tr>
          <td>${m.name}</td>
          <td>${m.url}</td>
          <td>${statusHTML}</td>
          <td>${response}</td>
          <td>${checked}</td>
          <td><button class="outline delete-btn" data-id="${m.id}">Delete</button></td>
        </tr>`;
      }).join('');

      tbody.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteMonitor(btn.dataset.id));
      });

      tbody.querySelectorAll('tr').forEach(row => {
        row.addEventListener('click', (e) => {
          if (e.target.classList.contains('delete-btn')) return;
          const btn = row.querySelector('.delete-btn');
          if (!btn) return;

      // Clear highlight from all rows, then mark this one
          tbody.querySelectorAll('tr').forEach(r => r.classList.remove('selected-row')); // 👈 clear all
          row.classList.add('selected-row'); // 👈 mark clicked row

          fetchChecks(btn.dataset.id);
        });
      });
    }

    // Add monitor
    document.getElementById('add-monitor-btn').addEventListener('click', async () => {
      const name = document.getElementById('monitor-name').value.trim();
      const url  = document.getElementById('monitor-url').value.trim();
      if (!name || !url) return;
      await fetch('/api/monitors/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Token ${token}` },
        body: JSON.stringify({ name, url })
      });
      document.getElementById('monitor-name').value = '';
      document.getElementById('monitor-url').value  = '';
      loadMonitors();
    });

    // Delete monitor
    async function deleteMonitor(id) {
      if (!confirm('Delete this monitor?')) return;
      await fetch(`/api/monitors/${id}/`, {
        method: 'DELETE',
        headers: { 'Authorization': `Token ${token}` }
      });
      loadMonitors();
    }
    
    async function fetchChecks(monitorId) {
      const res = await fetch(`/api/monitors/${monitorId}/checks/`, {
        headers: { 'Authorization': `Token ${token}` }
      });
      const data = await res.json();
      const labels = data.map(c => c.checked_at).reverse();
      const values = data.map(c => c.response_time_ms).reverse();
      monitorChart.data.labels = labels;
      monitorChart.data.datasets[0].data = values;
      monitorChart.update();
      document.getElementById('chart-container').style.display = 'block';
    }

    loadMonitors();
  </script>
</body>
</html>
